# Schema contract for NYC Yellow Taxi trip data
# Used by validation/schema_validator.py to enforce data quality rules
# Version-controlled so schema changes are reviewable in PRs

version: "1.0"
dataset: nyc_yellow_taxi_trips

columns:
  - name: vendor_id
    type: integer
    nullable: false
    allowed_values: [1, 2]

  - name: tpep_pickup_datetime
    type: timestamp
    nullable: false
    min_value: "2023-01-01 00:00:00"
    max_value: "2024-12-31 23:59:59"

  - name: tpep_dropoff_datetime
    type: timestamp
    nullable: false

  - name: passenger_count
    type: integer
    nullable: true
    min_value: 0
    max_value: 9

  - name: trip_distance
    type: float
    nullable: false
    min_value: 0.0
    max_value: 500.0

  - name: pickup_longitude
    type: float
    nullable: true
    min_value: -74.5
    max_value: -73.5

  - name: pickup_latitude
    type: float
    nullable: true
    min_value: 40.4
    max_value: 41.0

  - name: rate_code_id
    type: integer
    nullable: true
    allowed_values: [1, 2, 3, 4, 5, 6]

  - name: fare_amount
    type: float
    nullable: false
    min_value: 0.0
    max_value: 1000.0

  - name: tip_amount
    type: float
    nullable: false
    min_value: 0.0

  - name: total_amount
    type: float
    nullable: false
    min_value: 0.0
    max_value: 2000.0

  - name: payment_type
    type: integer
    nullable: true
    allowed_values: [1, 2, 3, 4, 5, 6]

quality_rules:
  # Dropoff must be after pickup
  - name: dropoff_after_pickup
    rule: "tpep_dropoff_datetime > tpep_pickup_datetime"
    severity: error

  # Total must be >= fare + tip
  - name: total_gte_fare_plus_tip
    rule: "total_amount >= fare_amount + tip_amount - 0.01"
    severity: warning

  # At least one passenger for non-zero fare
  - name: passengers_nonzero_for_paid_trip
    rule: "NOT (fare_amount > 0 AND passenger_count == 0)"
    severity: warning

thresholds:
  max_null_fraction: 0.05      # Flag if >5% nulls in any column
  min_row_count: 1000           # Fail if fewer than 1000 rows ingested
  max_duplicate_fraction: 0.01  # Flag if >1% duplicate rows
