version: "1.0"
dataset: nyc_yellow_taxi_trips

columns:
  - name: vendor_id
    type: integer
    nullable: true
    allowed_values: [1, 2]

  - name: tpep_pickup_datetime
    type: timestamp
    nullable: false
    min_value: "2020-01-01 00:00:00"
    max_value: "2027-12-31 23:59:59"

  - name: tpep_dropoff_datetime
    type: timestamp
    nullable: false

  - name: passenger_count
    type: integer
    nullable: true
    min_value: 0
    max_value: 9

  - name: trip_distance
    type: float
    nullable: true
    min_value: 0.0
    max_value: 500.0

  - name: rate_code_id
    type: integer
    nullable: true

  - name: fare_amount
    type: float
    nullable: true
    min_value: 0.0
    max_value: 1000.0

  - name: tip_amount
    type: float
    nullable: true
    min_value: 0.0

  - name: total_amount
    type: float
    nullable: true
    min_value: 0.0
    max_value: 2000.0

  - name: payment_type
    type: integer
    nullable: true

  - name: pickup_location_id
    type: integer
    nullable: true

  - name: dropoff_location_id
    type: integer
    nullable: true

quality_rules:
  - name: dropoff_after_pickup
    rule: "tpep_dropoff_datetime > tpep_pickup_datetime"
    severity: warning

  - name: total_gte_fare_plus_tip
    rule: "total_amount >= fare_amount + tip_amount - 0.01"
    severity: warning

thresholds:
  max_null_fraction: 0.15
  min_row_count: 100
  max_duplicate_fraction: 0.05
